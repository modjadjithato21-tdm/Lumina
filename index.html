<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Events | Rent & Illuminate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout-bar">
    <div class="logo-area">
        <h1>✨ Lumina Events</h1>
        <p>Rent • Decorate • Illuminate</p>
    </div>
    <button class="burger" id="burgerBtn">
        <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="navLinks">
            <a href="index.html">🛍️ Rent Gear</a>
            <a href="delivery.html">🚚 Checkout</a>
            <a href="chandelier.html">💡 Chandelier</a>
            <a href="track.html">🔍 Track Order</a>
            <a href="orders.html">📦 My Orders</a>
            <a href="admin.html">🔧 Admin</a>
        </div>
    </div>

    <main class="container">
        <div class="stepper">
            <div class="step active">1. Choose Items</div>
            <div class="step">2. Delivery & Extras</div>
            <div class="step">3. Confirm</div>
        </div>

        <div class="page-title">📅 Select Your Event Date</div>
        <input type="date" id="eventDate" class="date-input" style="padding:1rem; font-size:1.1rem; border-radius:40px; border:1px solid #cbd5e1; margin-bottom:2rem;">

        <div class="page-title">🎉 Available Gear & Lighting</div>
        <div id="categoriesContainer"></div>

        <div class="total-area">
            <div>
                <div class="total-label">🛒 Cart Total</div>
                <div class="total-amount" id="cartTotalDisplay">R0</div>
            </div>
            <div>
                <button class="btn btn-primary" id="proceedToDeliveryBtn">Proceed to Delivery →</button>
                <button class="btn btn-outline" id="resetCartBtn">Reset Cart</button>
            </div>
        </div>
    </main>

    <footer>
        © 2025 Lumina Events – Event Rentals & Chandelier Specialists
    </footer>

    <script type="module" src="js/index.js"></script>

    <script>
    // Burger menu toggle
    const burger = document.getElementById('burgerBtn');
    const navLinks = document.getElementById('navLinks');
    if (burger && navLinks) {
        burger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
        // Close menu when clicking a link
        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });
    }
</script>
</body>
</html>
