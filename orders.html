<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Events | My Orders</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout-bar">
    <div class="logo-area">
        <h1>✨ Lumina Events</h1>
        <p>Rent • Decorate • Illuminate</p>
    </div>
    <button class="burger" id="burgerBtn">
        <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="navLinks">
            <a href="index.html">🛍️ Rent Gear</a>
            <a href="delivery.html">🚚 Checkout</a>
            <a href="chandelier.html">💡 Chandelier</a>
            <a href="track.html">🔍 Track Order</a>
            <a href="orders.html">📦 My Orders</a>
            <a href="admin.html">🔧 Admin</a>
        </div>
    </div>

    <main class="container">
        <div class="page-title">📦 My Orders & Status</div>
        <div id="ordersListContainer" class="checkout-summary"></div>
    </main>

    <footer>© 2025 Lumina Events</footer>
    <script type="module" src="js/orders.js"></script>

    <script>
    // Burger menu toggle
    const burger = document.getElementById('burgerBtn');
    const navLinks = document.getElementById('navLinks');
    if (burger && navLinks) {
        burger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
        // Close menu when clicking a link
        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });
    }
</script>
</body>
</html>
