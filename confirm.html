<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Events | Confirm Order</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout-bar">
        <div class="logo-area">
            <h1>✨ Lumina Events</h1>
            <p>Rent • Decorate • Illuminate</p>
        </div>
        <button class="burger" id="burgerBtn">
            <span></span><span></span><span></span>
        </button>
        <div class="nav-links" id="navLinks">
            <a href="index.html">🛍️ Rent Gear</a>
            <a href="delivery.html">🚚 Checkout</a>
            <a href="chandelier.html">💡 Chandelier</a>
            <a href="track.html">🔍 Track Order</a>
            <a href="orders.html">📦 My Orders</a>
            <a href="admin.html">🔧 Admin</a>
        </div>
    </div>

    <main class="container">
        <div class="stepper">
            <div class="step done">1. Choose Items</div>
            <div class="step done">2. Delivery</div>
            <div class="step active">3. Confirm</div>
        </div>

        <div class="page-title">📋 Final Order Review</div>
        <div id="orderSummaryBlock" class="order-summary"></div>
        <div id="confirmMsg" style="margin:1rem 0; padding:1rem; border-radius:20px; display:none;"></div>

        <div style="margin: 2rem 0; display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
            <button id="whatsappBtn" class="btn">📱 Share on WhatsApp</button>
            <button id="requestBookingBtn" class="btn btn-primary">📝 Request Booking</button>
        </div>
    </main>

    <footer>© 2025 Lumina Events</footer>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="module" src="js/confirm.js"></script>
    <script>
        (function() {
            const burger = document.getElementById('burgerBtn');
            const navLinks = document.getElementById('navLinks');
            if (burger && navLinks) {
                burger.addEventListener('click', () => navLinks.classList.toggle('active'));
                navLinks.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => navLinks.classList.remove('active'));
                });
            }
        })();
    </script>
</body>
</html>
